name: Deploy to GitHub Pages

on:
  # 推送到 main 分支时触发部署
  push:
    branches: [main]
  # 也可以手动触发
  workflow_dispatch:

# 关键：给工作流开启写入权限
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 代码
        uses: actions/checkout@v5 # 升级到兼容 Node 20+ 的版本
        with:
          token: ${{ secrets.GITHUB_TOKEN }} # 强制使用带权限的 token

      - name: 安装 Node.js
        uses: actions/setup-node@v4 # 升级 setup-node 版本
        with:
          node-version: 20
          cache: 'npm'

      - name: 安装依赖
        run: npm ci
        working-directory: frontend-vue3

      - name: 构建项目（Vite）
        run: npm run build
        working-directory: frontend-vue3

      - name: 部署到 GitHub Pages
        uses: peaceiris/actions-gh-pages@v4 # 用稳定的 gh-pages 部署 action
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend-vue3/dist # Vite 构建产物的目录