[settings]
name = "mushroom-platform"
region = "us-east-1"

[[services]]
name = "backend"
root = "./backend-node"
buildCommand = "npm install && npm run build"
startCommand = "node app.js"
env = { PORT = "3000" }

[[services]]
name = "frontend"
root = "./frontend-vue3"
buildCommand = "npm install && npm run build"
startCommand = "npx serve -s dist -l 8080"
env = {}

[[plugins]]
name = "mysql"
type = "mysql"
version = "8.0"

[[env]]
name = "NODE_ENV"
value = "production"

[[env]]
name = "DB_HOST"
service = "mysql"
property = "host"

[[env]]
name = "DB_PORT"
service = "mysql"
property = "port"

[[env]]
name = "DB_NAME"
service = "mysql"
property = "database"

[[env]]
name = "DB_USER"
service = "mysql"
property = "username"

[[env]]
name = "DB_PASSWORD"
service = "mysql"
property = "password"
