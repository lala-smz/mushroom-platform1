version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: mushroom-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: mushroom_db
      MYSQL_USER: mushroom
      MYSQL_PASSWORD: mushroom123
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./backend-node/archive/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - mushroom-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: mushroom-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - mushroom-network

  backend:
    build:
      context: ./backend-node
      dockerfile: Dockerfile
    container_name: mushroom-backend
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: mushroom_db
      DB_USER: mushroom
      DB_PASSWORD: mushroom123
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PORT: 3000
      NODE_ENV: production
    ports:
      - "3000:3000"
    volumes:
      - ./backend-node/uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - mushroom-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend-vue3
      dockerfile: Dockerfile
    container_name: mushroom-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - mushroom-network
    restart: unless-stopped

volumes:
  mysql-data:
  redis-data:

networks:
  mushroom-network:
    driver: bridge
